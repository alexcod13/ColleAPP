<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Neuro-Atlas Interactif : Objectif Major</title>
  
  <!-- Chargement de Tailwind CSS pour le style -->
  <script src="https://cdn.tailwindcss.com"></script>
  
  <!-- Chargement de React et ReactDOM (sans compilation) -->
  <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
  
  <!-- Chargement de Babel pour comprendre le code JSX -->
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

  <style>
    /* Style pour la barre de défilement personnalisée */
    .custom-scrollbar::-webkit-scrollbar { width: 6px; }
    .custom-scrollbar::-webkit-scrollbar-track { background: transparent; }
    .custom-scrollbar::-webkit-scrollbar-thumb { background-color: #334155; border-radius: 20px; }
  </style>
</head>
<body class="bg-slate-900 text-slate-200 antialiased selection:bg-indigo-500 selection:text-white">
  
  <div id="root"></div>

  <!-- Script principal contenant toute l'application -->
  <script type="text/babel">
    const { useState } = React;

    // --- ICONES INTAGREES (Substitut autonome de lucide-react) ---
    const IconWrapper = ({ children, className }) => (
      <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}>
        {children}
      </svg>
    );

    const Brain = ({ className }) => <IconWrapper className={className}><path d="M9.5 2h5"/><path d="M16 2.5a4 4 0 0 1 1 7.5 4 4 0 0 1-1 7.5v2a2 2 0 0 1-2 2h-4a2 2 0 0 1-2-2v-2a4 4 0 0 1-1-7.5 4 4 0 0 1 1-7.5"/><path d="M12 2v20"/><path d="M12 7.5A2.5 2.5 0 0 0 9.5 5h-1A2.5 2.5 0 0 0 6 7.5v1A2.5 2.5 0 0 0 8.5 11"/><path d="M12 16.5A2.5 2.5 0 0 0 9.5 19h-1A2.5 2.5 0 0 0 6 16.5v-1A2.5 2.5 0 0 0 8.5 13"/><path d="M12 7.5A2.5 2.5 0 0 1 14.5 5h1A2.5 2.5 0 0 1 18 7.5v1A2.5 2.5 0 0 1 15.5 11"/><path d="M12 16.5A2.5 2.5 0 0 1 14.5 19h1A2.5 2.5 0 0 1 18 16.5v-1A2.5 2.5 0 0 1 15.5 13"/></IconWrapper>;
    const Activity = ({ className }) => <IconWrapper className={className}><polyline points="22 12 18 12 15 21 9 3 6 12 2 12"/></IconWrapper>;
    const Target = ({ className }) => <IconWrapper className={className}><circle cx="12" cy="12" r="10"/><circle cx="12" cy="12" r="6"/><circle cx="12" cy="12" r="2"/></IconWrapper>;
    const AlertTriangle = ({ className }) => <IconWrapper className={className}><path d="m21.73 18-8-14a2 2 0 0 0-3.48 0l-8 14A2 2 0 0 0 4 21h16a2 2 0 0 0 1.73-3Z"/><path d="M12 9v4"/><path d="M12 17h.01"/></IconWrapper>;
    const BookOpen = ({ className }) => <IconWrapper className={className}><path d="M2 3h6a4 4 0 0 1 4 4v14a3 3 0 0 0-3-3H2z"/><path d="M22 3h-6a4 4 0 0 0-4 4v14a3 3 0 0 1 3-3h7z"/></IconWrapper>;
    const UserCircle = ({ className }) => <IconWrapper className={className}><circle cx="12" cy="12" r="10"/><circle cx="12" cy="10" r="3"/><path d="M7 20.662V19a2 2 0 0 1 2-2h6a2 2 0 0 1 2 2v1.662"/></IconWrapper>;
    const CheckCircle2 = ({ className }) => <IconWrapper className={className}><circle cx="12" cy="12" r="10"/><path d="m9 12 2 2 4-4"/></IconWrapper>;
    const XCircle = ({ className }) => <IconWrapper className={className}><circle cx="12" cy="12" r="10"/><path d="m15 9-6 6"/><path d="m9 9 6 6"/></IconWrapper>;
    const GitFork = ({ className }) => <IconWrapper className={className}><circle cx="12" cy="18" r="3"/><circle cx="6" cy="6" r="3"/><circle cx="18" cy="6" r="3"/><path d="M18 9v1a2 2 0 0 1-2 2H8a2 2 0 0 1-2-2V9"/><path d="M12 12v3"/></IconWrapper>;
    const Info = ({ className }) => <IconWrapper className={className}><circle cx="12" cy="12" r="10"/><path d="M12 16v-4"/><path d="M12 8h.01"/></IconWrapper>;
    const Layers = ({ className }) => <IconWrapper className={className}><polygon points="12 2 2 7 12 12 22 7 12 2"/><polyline points="2 12 12 17 22 12"/><polyline points="2 17 12 22 22 17"/></IconWrapper>;


    // --- DATA: NERFS CRÂNIENS ---
    const nervesData = [
      { id: "I", name: "Nerf Olfactif", type: "Sensitif pur", origin: "Émanation du Télencéphale. Naît des cellules olfactives de la muqueuse nasale (tache jaune), traverse la lame criblée de l'ethmoïde et rejoint le bulbe olfactif situé sur la face inférieure du lobe frontal (sillon olfactif).", function: "Odorat (olfaction).", trap: "PIÈGE DE COURS : Ce n'est PAS un vrai nerf périphérique ! C'est une extension directe du Système Nerveux Central (SNC). Ses fibres possèdent une gaine de myéline de type central (produite par les oligodendrocytes, pas par les cellules de Schwann). Il n'a aucune origine sur le Tronc Cérébral." },
      { id: "II", name: "Nerf Optique", type: "Sensitif pur", origin: "Émanation du Diencéphale. Naît des cellules ganglionnaires de la rétine. Les deux nerfs optiques cheminent vers l'arrière et fusionnent pour former le chiasma optique.", function: "Vision.", trap: "PIÈGE : Comme le nerf I, c'est une extension du SNC (myéline centrale). Au niveau du chiasma optique, il se produit une décussation PARTIELLE : seules les fibres issues des hémi-rétines nasales croisent la ligne médiane. Les fibres des hémi-rétines temporales restent homolatérales." },
      { id: "III", name: "Nerf Oculomoteur", type: "Moteur + Parasympathique", origin: "Origine apparente : Mésencéphale, à sa face ANTÉRIEURE, au niveau de la fosse interpédonculaire (entre les deux pédoncules cérébraux).", function: "Motricité extrinsèque de l'œil (droit supérieur, inférieur, médial, oblique inférieur, releveur de la paupière). Motricité intrinsèque (parasympathique) : contraction de la pupille (Myosis) via le muscle sphincter de la pupille, et accommodation via le muscle ciliaire.", trap: "CLINIQUE : Une atteinte du III provoque un ptosis (chute de la paupière supérieure), un strabisme divergent, mais aussi une MYDRIASE (dilatation pupillaire) paralytique car la composante parasympathique constrictrice est détruite (le sympathique dilatateur prend le dessus)." },
      { id: "IV", name: "Nerf Trochléaire", type: "Moteur pur", origin: "Origine apparente : Mésencéphale, à sa face POSTÉRIEURE (sous les colliculi inférieurs de la lame quadrigéminale). Il contourne ensuite le tronc cérébral d'arrière en avant.", function: "Motricité oculaire : innerve uniquement le muscle oblique supérieur (permet de regarder en bas et en dedans, comme pour descendre des escaliers).", trap: "LE PIÈGE ABSOLU : C'est le SEUL nerf crânien de tout le corps humain à émerger à la face dorsale (postérieure) du tronc cérébral (névraxe). Tous les autres émergent en antéro-latéral." },
      { id: "V", name: "Nerf Trijumeau", type: "Mixte (Sensitif majeur + Moteur)", origin: "Origine apparente : Pont (Protubérance), à la face antéro-latérale, juste à la limite avec l'origine du pédoncule cérébelleux moyen. Possède une grosse racine sensitive et une petite racine motrice.", function: "C'est le grand nerf de la sensibilité de la face. Il se divise en 3 branches (V1 Ophtalmique, V2 Maxillaire, V3 Mandibulaire). La composante motrice gère les muscles de la mastication (masséter, temporal, ptérygoïdiens).", trap: "PIÈGE DE COURS : Seule la 3ème branche (le nerf mandibulaire V3) contient des fibres motrices ! Les nerfs V1 et V2 sont PUREMENT sensitifs." },
      { id: "VI", name: "Nerf Abducens", type: "Moteur pur", origin: "Origine apparente : Sillon bulbo-pontin. Il émerge très MÉDIALEMENT, juste au-dessus des pyramides bulbaires, de part et d'autre du foramen cæcum.", function: "Motricité oculaire : innerve uniquement le muscle droit latéral (permet l'abduction de l'œil, c'est-à-dire regarder vers l'extérieur).", trap: "Il faut connaître l'ordre d'émergence dans le sillon bulbo-pontin de dedans en dehors : VI (le plus médial), puis VII, puis VIII (le plus latéral)." },
      { id: "VII", name: "Nerf Facial", type: "Mixte + Parasympathique", origin: "Origine apparente : Sillon bulbo-pontin (en position intermédiaire, dans la fossette latérale du bulbe, entre le VI et le VIII).", function: "Moteur : Muscles de la mimique faciale (fermeture des yeux, sourire). Sensitif : Goût des 2/3 antérieurs de la langue. Parasympathique : Sécrétion des glandes lacrymales, submandibulaires et sublinguales.", trap: "ATTENTION : Il traverse la glande parotide en la divisant en deux lobes, MAIS il n'innerve absolument pas la glande parotide ! C'est un simple lieu de passage (l'innervation de la parotide est dévolue au nerf IX)." },
      { id: "VIII", name: "Nerf Vestibulo-Cochléaire", type: "Sensitif pur", origin: "Origine apparente : Sillon bulbo-pontin, à son extrémité la plus LATÉRALE, près du pédoncule cérébelleux inférieur et du flocculus du cervelet.", function: "Nerf cochléaire : Audition. Nerf vestibulaire : Équilibre (accélérations linéaires et rotatoires).", trap: "CLINIQUE : En raison de sa position anatomique dans l'angle ponto-cérébelleux (très latéral), une tumeur bénigne (neurinome de l'acoustique) à cet endroit le comprime très rapidement, provoquant surdité de perception unilatérale, acouphènes et vertiges." },
      { id: "IX", name: "Nerf Glossopharyngien", type: "Mixte + Parasympathique", origin: "Origine apparente : Bulbe rachidien, dans le sillon RÉTRO-olivaire (en arrière de l'olive bulbaire). C'est le plus supérieur de ce sillon.", function: "Moteur : Déglutition (muscles du pharynx). Sensitif : Goût du 1/3 postérieur de la langue. Parasympathique : Innervation sécrétoire de la GLANDE PAROTIDE.", trap: "L'origine dans le sillon rétro-olivaire regroupe les nerfs mixtes de la déglutition et de la phonation (IX, X, XI). C'est bien le IX qui donne le contingent parasympathique de la parotide." },
      { id: "X", name: "Nerf Vague (Pneumogastrique)", type: "Mixte + Parasympathique", origin: "Origine apparente : Bulbe rachidien, dans le sillon RÉTRO-olivaire, juste en dessous du IX.", function: "Moteur : Phonation (cordes vocales via le nerf récurrent) et déglutition. Parasympathique : C'est le principal contingent parasympathique du corps (ralentissement cardiaque, broncho-constriction, péristaltisme digestif).", trap: "Particularité anatomique : Ses fibres pré-ganglionnaires parasympathiques sont gigantesques. Elles descendent depuis le tronc cérébral, traversent le cou, le thorax, et descendent dans l'abdomen pour innerver le tube digestif jusqu'à l'angle colique gauche !" },
      { id: "XI", name: "Nerf Accessoire", type: "Moteur pur", origin: "Origine apparente : Bulbe rachidien (sillon RÉTRO-olivaire, en dessous du X) ET Moelle spinale cervicale (racines spinales remontant par le foramen magnum).", function: "Motricité céphalogyre : innerve les muscles Sterno-Cléido-Mastoïdien (SCM) et le muscle Trapèze (permet de tourner la tête et hausser les épaules).", trap: "PIÈGE : C'est le seul nerf crânien à posséder une double origine : une racine crânienne (bulbaire) et une racine spinale (qui naît de la moelle cervicale supérieure C1-C5, remonte dans le crâne puis en ressort)." },
      { id: "XII", name: "Nerf Hypoglosse", type: "Moteur pur", origin: "Origine apparente : Bulbe rachidien, dans le sillon PRÉ-olivaire (en avant de l'olive bulbaire, entre l'olive et la pyramide).", function: "Motricité stricte de la langue (permet la protraction et les mouvements complexes de la langue).", trap: "TOPOGRAPHIE : C'est le SEUL nerf crânien à émerger dans le sillon pré-olivaire. Tout ce qui est moteur pur a tendance à émerger plus en avant (plus médialement) que les nerfs mixtes/sensitifs." }
    ];

    // --- DATA: WILLIS ---
    const willisData = {
      acoa: { id: "acoa", name: "Artère Communicante Antérieure", inPolygon: true, desc: "Très courte anastomose artérielle impaire et médiane. Elle relie transversalement l'Artère Cérébrale Antérieure droite et l'Artère Cérébrale Antérieure gauche, passant juste au-dessus du chiasma optique.", territory: "Elle ne vascularise pas de territoire cortical proprement dit. Son rôle est purement hémodynamique : elle équilibre les pressions entre les systèmes carotidiens droit et gauche. C'est le site anatomique n°1 des ruptures d'anévrismes intracrâniens (hémorragies méningées spontanées de l'adulte)." },
      aca: { id: "aca", name: "Artère Cérébrale Antérieure", inPolygon: true, desc: "Branche terminale (bifurcation interne) de l'Artère Carotide Interne. Elle se dirige en avant et en dedans, s'engage dans la fissure longitudinale du cerveau, et contourne le corps calleux (d'avant en arrière) qu'elle accompagne sur toute sa longueur.", territory: "Vascularise la face MÉDIALE (interne) des lobes frontaux et pariétaux. Territoire clinique crucial : le lobule paracentral (qui contient les aires motrice et sensitive du membre inférieur). Une ischémie (AVC) de cette artère provoque un déficit sensitivo-moteur controlatéral à prédominance CRURALE (atteinte majeure de la jambe, face et bras épargnés)." },
      aci: { id: "aci", name: "Artère Carotide Interne", inPolygon: true, desc: "Nait de la bifurcation carotidienne (C4), monte sans donner de collatérales cervicales, pénètre dans la base du crâne par le canal carotidien (os temporal), chemine dans le sinus caverneux. Elle donne des collatérales intracrâniennes (Artère Ophtalmique, Artère Choroïdienne Antérieure) et participe au polygone via l'Artère Communicante Postérieure, avant de se diviser en ACA et ACM.", territory: "Système artériel antérieur. Assure environ 80% de la vascularisation de l'encéphale (presque tout le cerveau sus-tentoriel sauf le lobe occipital)." },
      acm: { id: "acm", name: "Artère Cérébrale Moyenne (Artère Sylvienne)", inPolygon: false, desc: "Branche terminale externe, la plus volumineuse, de l'Artère Carotide Interne. Elle s'échappe latéralement pour s'engouffrer dans le sillon latéral (scissure de Sylvius), dont elle va parcourir toute la profondeur avant de s'épanouir à la surface du cerveau. PIÈGE DE COURS : Bien qu'issue de l'ACI, ELLE NE FAIT PARTIE DU POLYGONE DE WILLIS (elle ne participe pas au cercle anastomotique, c'est une artère d'échappement vers le cortex).", territory: "Vascularise les 2/3 de la convexité (face supéro-latérale) du cerveau (lobes frontal, pariétal et temporal partiels). Vascularise l'aire motrice de la face et du bras, et les aires du langage (Broca, Wernicke) sur l'hémisphère dominant. Un AVC sylvien donne une hémiplégie BRACHIO-FACIALE controlatérale et, souvent, une aphasie." },
      acop: { id: "acop", name: "Artère Communicante Postérieure", inPolygon: true, desc: "Collatérale inconstante mais physiologiquement vitale, naissant de l'Artère Carotide Interne (avant sa bifurcation terminale). Elle se dirige vers l'arrière pour s'anastomoser avec l'Artère Cérébrale Postérieure.", territory: "C'est la véritable clé de voûte de l'anastomose : elle relie le système CAROTIDIEN (antérieur) au système VERTÉBRO-BASILAIRE (postérieur). En cas d'occlusion lente du tronc basilaire, le sang carotidien peut emprunter cette voie pour perfuser l'arrière du cerveau (et inversement)." },
      acp: { id: "acp", name: "Artère Cérébrale Postérieure", inPolygon: true, desc: "Issues de la bifurcation terminale (en T) du Tronc Basilaire (en avant du mésencéphale). Elles contournent les pédoncules cérébraux et se dirigent vers la face inférieure et postérieure du cerveau. Elles reçoivent les artères communicantes postérieures, fermant ainsi le polygone de Willis en arrière.", territory: "Vascularise la face inférieure du lobe temporal et la quasi-totalité du LOBE OCCIPITAL (incluant le cortex visuel primaire situé sur les berges de la scissure calcarine). Son occlusion (AVC) entraîne classiquement une Hémianopsie Latérale Homonyme (HLH) controlatérale avec épargne maculaire." },
      basilaire: { id: "basilaire", name: "Tronc Basilaire", inPolygon: false, desc: "Vaisseau artériel impair, médian et volumineux, formé par la réunion des deux artères vertébrales à la jonction bulbo-pontine. Il monte verticalement dans la gouttière basilaire à la face antérieure du pont (protubérance). PIÈGE : Il vient alimenter le polygone de Willis par l'arrière (en donnant les ACP), mais IL N'APPARTIENT PAS au cercle anatomique du polygone stricto sensu.", territory: "Vascularise les structures vitales infratentorielles : le tronc cérébral (artères perforantes pontiques) et le cervelet via deux paires d'artères majeures (AICA : Artère Cérébelleuse Inféro-Antérieure ; et SCA : Artère Cérébelleuse Supérieure). L'occlusion aiguë du tronc basilaire provoque un infarctus gravissime du tronc cérébral (coma, mort, ou 'Locked-in syndrome')." }
    };

    // --- DATA: CAROTIDE EXTERNE ---
    const aceData = {
      acc: { name: "Artère Carotide Commune", desc: "Tronc artériel souche (gauche naissant de la crosse aortique, droite naissant du tronc brachio-céphalique). Elle monte verticalement dans le cou, emballée dans la gaine carotidienne (avec la veine jugulaire interne et le nerf vague X).", trap: "Repère topographique essentiel : L'ACC se bifurque en Carotide Interne et Carotide Externe au niveau du bord supérieur du cartilage thyroïde, ce qui correspond à la hauteur de la vertèbre cervicale C4." },
      aci: { name: "Artère Carotide Interne", desc: "Branche de bifurcation destinée à l'encéphale. Bien que nommée 'interne', à son origine elle se situe souvent légèrement en arrière (postérieure) et en dehors par rapport à l'ACE. Elle poursuit son trajet tout droit vers la base du crâne.", trap: "LE GRAND PIÈGE : L'Artère Carotide Interne ne donne rigoureusement AUCUNE branche collatérale au niveau cervical. Elle ne commence à distribuer des branches qu'une fois entrée dans la boîte crânienne (artère ophtalmique)." },
      thyroidienne: { name: "Artère Thyroïdienne Supérieure", desc: "C'est la toute 1ère collatérale de l'ACE. C'est une collatérale ANTÉRIEURE. Elle se détache presque immédiatement après la bifurcation, se dirige vers l'avant et le bas. Elle vascularise le larynx et le pôle supérieur de la glande thyroïde (où elle s'anastomose avec la thyroïdienne inférieure)." },
      linguale: { name: "Artère Linguale", desc: "C'est la 2ème collatérale ANTÉRIEURE. Elle naît au-dessus de la thyroïdienne supérieure. Elle chemine vers l'avant, passe au-dessus de la grande corne de l'os hyoïde, puis s'enfonce profondément dans la musculature de la langue (sous le muscle hyo-glosse) pour vasculariser la langue et le plancher buccal." },
      faciale: { name: "Artère Faciale", desc: "C'est la 3ème collatérale ANTÉRIEURE. Elle possède un trajet complexe : elle s'engage d'abord sous la mandibule (en rapport intime avec la glande submandibulaire), puis contourne le bord inférieur de la mandibule (où son pouls est palpable) pour remonter obliquement sur la face, en direction de la commissure des lèvres et des ailes du nez. Elle se termine à l'angle interne de l'œil (artère angulaire). C'est l'artère vasculaire de la mimique et de la face superficielle." },
      pharyngienne: { name: "Artère Pharyngienne Ascendante", desc: "Collatérale souvent classée comme POSTÉRIEURE (ou médiale). C'est une artère fine et profonde. Elle monte verticalement le long des parois latérales du pharynx qu'elle est chargée d'irriguer, ainsi qu'une partie de la base du crâne." },
      occipitale: { name: "Artère Occipitale", desc: "Collatérale POSTÉRIEURE. Elle naît de la face postérieure de l'ACE, se dirige vers le haut et l'arrière, passe sous le ventre postérieur du muscle digastrique, et va vasculariser la région nucale et le cuir chevelu postérieur." },
      auriculaire: { name: "Artère Auriculaire Postérieure", desc: "Collatérale POSTÉRIEURE. Elle se détache au-dessus de l'occipitale, chemine vers l'arrière et le haut, et se glisse dans le sillon rétro-auriculaire (derrière l'oreille, en regard du processus mastoïde de l'os temporal)." },
      temporale: { name: "Artère Temporale Superficielle", desc: "C'est l'une des deux branches TERMINALES de l'ACE. Elle est la continuation directe mais superficielle de l'axe vasculaire. Elle monte verticalement en traversant la parotide, passe juste en avant du conduit auditif externe et du tragus (où son pouls est facilement palpable et perceptible contre l'arcade zygomatique). Elle irrigue le cuir chevelu pariéto-temporal." },
      maxillaire: { name: "Artère Maxillaire", desc: "C'est la deuxième branche TERMINALE, volumineuse et très profonde. Elle se détache à angle droit au niveau du col de la mandibule, plonge dans la fosse infratemporale puis dans la fosse ptérygo-palatine. Elle donne 14 à 15 branches collatérales pour irriguer les cavités nasales, le palais, les dents, et les muscles profonds de la face.", trap: "Clinique : C'est une artère majeure de la chirurgie oro-maxillo-faciale. Parmi ses branches collatérales fondamentales, elle donne l'Artère Méningée Moyenne (qui remonte entrer dans le crâne par le foramen épineux et est responsable des hématomes extra-duraux en cas de fracture de la tempe)." }
    };

    // --- DATA: TRONC CÉRÉBRAL ---
    const brainstemData = {
      n12: { name: "Cerveau (Hors Tronc Cérébral) : Nerfs I et II", desc: "Les nerfs Olfactif (I) et Optique (II) sont des structures uniques en anatomie périphérique. Le nerf I est issu de l'évagination du télencéphale (pôle antérieur du cerveau). Le nerf II est issu de l'évagination du diencéphale.", trap: "RÈGLE ABSOLUE : Ils ne prennent JAMAIS leur origine sur les structures du Tronc Cérébral. Histologiquement, ce sont des prolongements de la substance blanche centrale du cerveau, recouverts de myéline d'origine centrale (oligodendrocytes) et non périphérique (cellules de Schwann)." },
      mesencephale: { name: "Mésencéphale", desc: "C'est la vésicule crâniale (la plus haute) du tronc cérébral. Il relie le diencéphale (au-dessus) au pont (en dessous). Sa face antérieure est constituée de deux épais piliers de substance blanche : les pédoncules cérébraux, séparés par un creux, la fosse interpédonculaire.", trap: "Il donne l'origine apparente de deux nerfs moteurs oculaires : le nerf Oculomoteur (III) naît en AVANT (dans la fosse interpédonculaire), et le nerf Trochléaire (IV) naît en ARRIÈRE (à la face dorsale, sous la lame quadrigéminale)." },
      pont: { name: "Pont (Protubérance)", desc: "Étage intermédiaire, très renflé vers l'avant. Il dérive du métencéphale. Sa face antérieure est creusée verticalement en son centre par le sillon basilaire (qui accueille le tronc basilaire). Latéralement, il se prolonge par les volumineux pédoncules cérébelleux moyens qui le relient au cervelet.", trap: "Topographie stricte : C'est le lieu d'émergence EXCLUSIF du très volumineux nerf Trijumeau (V), qui naît à la transition exacte entre la face antérieure du pont et la base du pédoncule cérébelleux moyen." },
      bulbe: { name: "Bulbe Rachidien (Moelle Allongée)", desc: "L'étage inférieur du tronc cérébral, dérivé du myélencéphale. Il fait la transition en bas avec la moelle spinale (jonction bulbo-médullaire, au niveau du foramen magnum). Sa face antérieure présente la fissure médiane antérieure, les pyramides (en dedans) et les olives (en dehors).", trap: "La limite supérieure du bulbe est très marquée transversalement : c'est le sillon bulbo-pontin, d'où émergent les nerfs VI, VII et VIII." },
      pyramide: { name: "Pyramides Bulbaires", desc: "Ce sont deux cordons saillants longitudinaux situés de part et d'autre de la fissure médiane antérieure du bulbe. Ils contiennent les faisceaux pyramidaux (ou faisceaux cortico-spinaux), qui sont les faisceaux d'axones moteurs descendants responsables de la motricité volontaire.", trap: "À la partie basse du bulbe, 80 à 90% de ces fibres motrices croisent la ligne médiane pour changer de côté : c'est la décussation pyramidale. Toute lésion située au-dessus de cette décussation donnera une paralysie controlatérale." },
      olive: { name: "Olive Bulbaire", desc: "C'est une éminence ovalaire située à la partie antéro-latérale de la moitié supérieure du bulbe rachidien. Elle est formée par la présence sous-jacente du noyau olivaire inférieur (un volumineux noyau de substance grise très festonné, lié au cervelet).", trap: "C'est le repère d'émergence par excellence : le sillon pré-olivaire (en avant de l'olive) donne naissance au nerf XII. Le sillon rétro-olivaire (en arrière de l'olive) donne naissance, de haut en bas, aux nerfs IX, X et XI." }
    };

    // --- DATA: APPAREIL DIGESTIF ---
    const digestiveData = {
      oesophage: { id: "oesophage", name: "Œsophage", mobility: "fixe", typeText: "Conduit", attach: "Hiatus œsophagien", desc: "Long tuyau d'environ 25 cm faisant suite au pharynx en C6. Il est constitué de 3 portions : cervicale (courte), thoracique (principale, dans le médiastin postérieur), et abdominale (très courte). Il traverse le diaphragme par le hiatus œsophagien en T10. Le cardia (T11) fait suite à la portion abdominale et mène à l'estomac. Rapports : il se situe en arrière de la trachée, qu'il dépasse légèrement à gauche. L'aorte descendante est d'abord pré-œsophagienne, puis latéro-œsophagienne gauche, et enfin rétro-œsophagienne (avant de traverser le hiatus aortique tendineux en T12).", trap: "CLINIQUE MAJEURE (Anastomose porto-cave) : Le cardia (jonction non continente) possède un double drainage. Principalement dans le système porte, secondairement dans le système cave (veines diaphragmatiques). En cas de cirrhose, l'hypertension portale refoule le sang, provoquant des varices œsophagiennes. Celles-ci peuvent céder et entrainer des hématémèses associées à un risque de décès." },
      foie: { id: "foie", name: "Foie", mobility: "fixe", typeText: "Glande", attach: "Ligaments et area nuda", desc: "Organe thoraco-abdominal, c'est une énorme glande amphicrine. Il projette principalement dans l'hypochondre droit, mais aussi en région épigastrique et hypochondre gauche. Physiologiquement, son bord inférieur ne dépasse pas le gril costal. Il comporte une face diaphragmatique (portion lisse antéro-supérieure, et portion irrégulière postéro-supérieure comprenant une région non péritonisée d'adhérence avec le diaphragme par où passe la Veine Cave Inférieure) et une face viscérale inférieure plane. Il est fixé au diaphragme par l'area nuda et par des ligaments suspenseurs (coronaires, falciforme).", trap: "Hépatomégalie : le foie déborde du gril costal. Anastomose porto-cave : Le foie reçoit le sang de la veine porte. Au niveau de l'ombilic, le drainage se fait vers le système cave, mais il existe le ligament rond (reliquat de la veine ombilicale). Lors d'une hypertension portale, le ligament rond s'ouvre sous la pression et le sang portal fuit vers la région ombilicale : c'est la Tête de Méduse." },
      estomac: { id: "estomac", name: "Estomac", mobility: "mobile", typeText: "Intestin Antérieur", attach: "Mésos (Omentums)", desc: "Intestin antérieur (vascularisé par l'artère gastrique gauche issue du tronc cœliaque naissant en T12). Forme de cornemuse, mobile et extensible (rôle de stockage) dans l'étage sus-mésocolique. Possède 2 courbures (petite à droite, grande à gauche). Régions : Cardia (T11, orifice non continent, angle cardio-tubérositaire formant un clapet anti-reflux), Fundus (grosse tubérosité), Corps, Antre pylorique, et Pylore (L1, orifice continent / sphincter). Il est relié à la paroi et aux organes par des mésos : le petit omentum (vers le foie) et le grand omentum (qui pend en tablier et peut colmater une inflammation).", trap: "CLINIQUE : Hernie hiatale par glissement (la jonction œsophage-estomac ascensionne et l'angle cardio-tubérositaire disparaît) ou par roulement (le fundus dépasse le diaphragme mais l'angle est conservé). Sténose du pylore (enfants). Ulcères gastriques (souvent antre pylorique)." },
      duodenum: { id: "duodenum", name: "Duodénum", mobility: "fixe", typeText: "Intestin Ant. / Moyen", attach: "Sac de péritoine plaqué", desc: "Première portion de l'intestin grêle. Il forme le cadre duodénal intimement lié au pancréas. Il possède 4 portions : D1 (L1, ampoule duodénale, suite au pylore), D2 (descend bord droit rachis jusqu'à L4, contient les papilles mineure et majeure sur sa face médiale), D3 (horizontal en L4), D4 (ascendante à gauche du rachis jusqu'à L2, forme l'angle duodéno-jéjunal fixé à la paroi postérieure par du péritoine). La portion distale de la papille majeure délimite l'intestin antérieur et l'intestin moyen.", trap: "PIÈGE DE COURS : Le duodénum est un organe très FIXE. Le bloc duodéno-pancréatique est enchâssé dans un sac de péritoine plaqué contre la paroi postérieure, ce qui donne l'impression que le pancréas et le duodénum sont rétropéritonéaux, bien qu'ils soient en réalité intrapéritonéaux." },
      pancreas: { id: "pancreas", name: "Pancréas", mobility: "fixe", typeText: "Glande", attach: "Sac de péritoine plaqué", desc: "Glande amphicrine (endocrine: insuline/glucagon ; exocrine: sucs) enchâssée dans le cadre duodénal. Le bloc duodéno-pancréatique est accolé à la paroi postérieure. Parties : Tête (enchâssée entre D1, D2, D3), Processus unciné/uncus (crochet inférieur), Isthme (zone rétrécie), Corps, et Queue. Le canal pancréatique principal part de la queue, chemine vers la tête, rejoint le canal cholédoque et se jette dans la papille duodénale majeure de D2.", trap: "FIXITÉ ET CLINIQUE : Enchâssé dans un sac péritonéal plaqué à la paroi postérieure. En cas de calculs formés dans les voies biliaires et bloqués au niveau de la papille majeure, l'obstruction entraîne une pancréatite aiguë hémorragique (les sucs digèrent le pancréas)." },
      jejunum: { id: "jejunum", name: "Jéjunum", mobility: "mobile", typeText: "Intestin Moyen", attach: "Le Mésentère", desc: "Portion proximale de l'intestin grêle (faisant suite au duodénum). Il appartient à l'intestin moyen et est vascularisé par les branches gauches de l'Artère Mésentérique Supérieure (AMS, née en L1). Agencement caractéristique : les anses jéjunales sont disposées de manière HORIZONTALE. Il assure l'absorption des nutriments via des villosités muqueuses.", trap: "Le jéjunum est complètement libre dans la cavité péritonéale. Il est relié à la paroi postérieure par le MÉSENTÈRE. Ce méso assure une très grande MOBILITÉ, nécessaire au péristaltisme, et achemine les vaisseaux et les nerfs jusqu'au tube digestif." },
      ileum: { id: "ileum", name: "Iléum", mobility: "mobile", typeText: "Intestin Moyen", attach: "Le Mésentère", desc: "Portion terminale de l'intestin grêle (l'ensemble jéjunum+iléum = 15-16 anses, 6m de long, 3cm de diamètre). Appartient à l'intestin moyen (AMS). Agencement caractéristique : les anses iléales sont disposées de manière VERTICALE. L'iléum se termine en se jetant dans le cæcum au niveau de la jonction (ou angle) iléo-cæcale.", trap: "Très MOBILE car il est également relié à la paroi par le MÉSENTÈRE. Un volvulus (torsion sur lui-même) peut survenir, empêchant la bonne vascularisation et provoquant une occlusion intestinale." },
      colon_droit: { id: "colon_droit", name: "Cæcum & Côlon Ascendant", mobility: "fixe", typeText: "Intestin Moyen", attach: "Mésocôlon ascendant (Fascia)", desc: "Intestin moyen (vascularisé par AMS). Cæcum : portion dilatée (6cm de diamètre) mobile, juste sous la peau, dans la fosse iliaque droite. Il est borgne, fait suite à la jonction iléo-cæcale, et porte l'appendice vermiforme (vers lequel convergent les 3 tænias coli). Côlon ascendant : monte dans le flanc droit jusqu'à l'angle colique droit (L1) situé sous le foie. Il mesure 10cm de long, 6cm de diamètre, et possède 1 tænia antérieur et 2 postérieurs.", trap: "PIÈGE DE COURS : Le côlon ascendant est une portion FIXE ! Il existe un mésocôlon ascendant, qui est un fascia, faisant du côlon ascendant une portion fixe du tube digestif (un fascia est un méso accolé à la paroi). Clinique du cæcum : appendicite avec douleur dans la fosse iliaque droite et psoïtis (contracture involontaire du muscle psoas)." },
      transverse: { id: "transverse", name: "Côlon Transverse", mobility: "mobile", typeText: "Intestin Moyen & Post.", attach: "Mésocôlon Transverse", desc: "De l'angle colique droit (L1) à l'angle colique gauche (T11-T12, sous la rate, plus profond). 5 cm de diamètre. Les 2/3 droits appartiennent à l'intestin moyen (AMS), le 1/3 gauche à l'intestin postérieur (vascularisé par l'AMI, née en L3). Présente des haustrations, 1 tænia antérieur et 2 postérieurs.", trap: "Il est très MOBILE car relié à la paroi par un méso : le Mésocôlon transverse. Attention aux rapports de cette racine : Le mésocôlon transverse sépare la cavité en un compartiment sus-mésocolique (estomac, intestin antérieur) et un compartiment sub-mésocolique (intestin moyen et postérieur)." },
      colon_gauche: { id: "colon_gauche", name: "Côlon Descendant", mobility: "fixe", typeText: "Intestin Postérieur", attach: "Mésocôlon descendant (Fascia)", desc: "Intestin postérieur (vascularisé par les branches de l'AMI naissant en L3). Longe le flanc gauche depuis l'angle colique gauche (T11) jusqu'à la fosse iliaque gauche. 4cm de diamètre. Devient plus lisse de proximal en distal par diminution des haustrations. Portion lombaire (1 tænia antérieur, 2 postérieurs : postéro-latéral et postéro-médial). Portion iliaque (1 tænia antérieur, 1 postérieur).", trap: "Tout comme l'ascendant, il est totalement FIXE ! Il existe un mésocôlon descendant accolé à la paroi, rendant cette portion fixe." },
      sigmoide: { id: "sigmoide", name: "Côlon Sigmoïde", mobility: "mobile", typeText: "Intestin Postérieur", attach: "Méso-sigmoïde", desc: "Dernière portion du côlon, en forme de lettre grecque sigma (S). Fait suite au côlon descendant en regard du détroit supérieur. Forme une concavité dans le pelvis et s'abouche au rectum en S3. 3 cm de diamètre. Il est SANS haustrations et possède 2 tænias (antérieur et postérieur). Le nombre de diverticules augmente avec la distalité.", trap: "Extrêmement MOBILE grâce à la présence d'un méso-sigmoïde ! Sa grande mobilité peut causer un volvulus. Par ailleurs, la présence de nombreux diverticules à ce niveau peut entraîner une sigmoïdite (inflammation)." },
      rectum: { id: "rectum", name: "Rectum & Canal Anal", mobility: "fixe", typeText: "Intestin Postérieur", attach: "Espace sous-péritonéal", desc: "Fait suite au sigmoïde en S3. 12 cm de haut, 3 cm de diamètre. Rôle de réservoir. L'ampoule rectale (plis et sillons) se poursuit par le canal anal (qui abouche à la peau). Moulé sur la concavité du sacrum. Changement de direction à la jonction ano-rectale : le canal anal part vers l'avant. Angle ano-rectal (cap anal) de 100°. Système sphinctérien : interne (végétatif, épaississement de la circulaire) et externe (somatique). Portion proximale péritonisée/mobile, portion distale fixe.", trap: "CLINIQUE MAJEURE (Anastomose porto-cave) : Le rectum se draine vers le système cave ET le système porte. Lors d'une cirrhose, l'hypertension portale provoque la dilatation des varices hémorroïdaires. Le patient peut décéder de rectorragies cataclysmiques (saignements du rectum). Cancer colorectal (dépistage)." }
    };

              tr:"DEUX PIÈGES CLINIQUES MAJEURS : 1) L'artère utérine croise l'uretère par EN AVANT (mnémotechnique : 'l'eau coule sous le pont'). C'est un risque chirurgical massif. 2) Sa forme en zig-zag lui permet de s'étirer et de s'allonger considérablement lors de la grossesse.", c:[] },

              tr:"L'ordre des éléments vasculonerveux dans le canal pudendal, de haut en bas, est : NERF pudendal (supérieur) > ARTÈRE pudendale (milieu) > VEINE pudendale (inférieure). Une compression ici donne le 'Syndrome d'Alcock' (névralgies périnéales fréquentes chez les cyclistes).", c:[

                    <text x="130" y="255" fill="#fcd34d" fontSize="10" fontWeight="bold">VI</text>

                    <circle cx="115" cy="265" r="4.5" fill="#fbbf24" filter="url(#glowBrain)" className="cursor-pointer" onClick={() => handleSelect(nervesData.find(n=>n.id==="VII"))} />
                    <text x="110" y="255" fill="#fcd34d" fontSize="10" fontWeight="bold">VII</text>

                    <circle cx="95" cy="265" r="4.5" fill="#fbbf24" filter="url(#glowBrain)" className="cursor-pointer" onClick={() => handleSelect(nervesData.find(n=>n.id==="VIII"))} />
                    <text x="85" y="255" fill="#fcd34d" fontSize="10" fontWeight="bold">VIII</text>

                    <circle cx="120" cy="320" r="3.5" fill="#fbbf24" filter="url(#glowBrain)" className="cursor-pointer" onClick={() => handleSelect(nervesData.find(n=>n.id==="XII"))} />
                    <text x="127" y="324" fill="#fcd34d" fontSize="10" fontWeight="bold">XII</text>

                    <circle cx="85" cy="300" r="3.5" fill="#fbbf24" filter="url(#glowBrain)" className="cursor-pointer" onClick={() => handleSelect(nervesData.find(n=>n.id==="IX"))} />
                    <text x="65" y="304" fill="#fcd34d" fontSize="10" fontWeight="bold">IX</text>

                    <circle cx="85" cy="320" r="3.5" fill="#fbbf24" filter="url(#glowBrain)" className="cursor-pointer" onClick={() => handleSelect(nervesData.find(n=>n.id==="X"))} />
                    <text x="65" y="324" fill="#fcd34d" fontSize="10" fontWeight="bold">X</text>

                    <circle cx="85" cy="340" r="3.5" fill="#fbbf24" filter="url(#glowBrain)" className="cursor-pointer" onClick={() => handleSelect(nervesData.find(n=>n.id==="XI"))} />
                    <text x="65" y="344" fill="#fcd34d" fontSize="10" fontWeight="bold">XI</text>
                  </svg>
                </div>

                <div className="lg:col-span-7 flex flex-col gap-6">
                   {selectedItem ? (
                    <div className="bg-slate-800 p-8 rounded-3xl border border-slate-700 h-full flex flex-col shadow-2xl">
                      <div className="flex justify-between items-start mb-6">
                        <h2 className="text-3xl font-black text-white leading-tight">
                          {selectedItem.id ? <span className="text-emerald-400 mr-2">Nerf {selectedItem.id}:</span> : null}
                          {selectedItem.name}
                        </h2>
                        {selectedItem.type && <span className="bg-slate-700 text-slate-300 px-3 py-1 rounded-lg text-sm font-bold shadow-inner">{selectedItem.type}</span>}
                      </div>
                      
                      <div className="space-y-6 flex-grow overflow-y-auto pr-4 custom-scrollbar">
                        {selectedItem.origin && (
                          <div>
                            <h3 className="text-xs font-black tracking-widest text-slate-500 uppercase mb-3 border-b border-slate-700 pb-2">Origine Apparente & Topographie</h3>
                            <p className="text-slate-200 leading-relaxed text-lg text-justify font-medium">{selectedItem.origin || selectedItem.desc}</p>
                          </div>
                        )}
                        {selectedItem.function && (
                          <div>
                            <h3 className="text-xs font-black tracking-widest text-slate-500 uppercase mb-3 border-b border-slate-700 pb-2">Composantes & Fonctions</h3>
                            <p className="text-emerald-200 font-medium leading-relaxed text-lg text-justify">{selectedItem.function}</p>
                          </div>
                        )}
                        {selectedItem.trap && (
                          <div className="bg-amber-500/10 p-6 rounded-2xl border border-amber-500/30 mt-6 shadow-sm">
                            <h3 className="text-amber-400 font-bold flex items-center gap-2 mb-3"><AlertTriangle className="w-5 h-5"/> Le Piège de l'Examinateur</h3>
                            <p className="text-amber-100 leading-relaxed font-medium text-justify text-lg">{selectedItem.trap}</p>
                          </div>
                        )}
                      </div>
                    </div>
                  ) : (
                    <div className="bg-slate-800/50 p-8 rounded-3xl border border-slate-700/50 border-dashed h-full flex flex-col items-center justify-center text-slate-500 text-center shadow-inner">
                      <UserCircle className="w-20 h-20 mb-6 opacity-20" />
                      <p className="text-2xl font-bold text-slate-400 mb-4">Anatomie du Tronc Cérébral</p>
                      <p className="text-lg font-medium text-slate-500 max-w-lg mb-6">Clique sur un relief anatomique (zones vertes) ou sur le point d'émergence d'un nerf crânien (points jaunes).</p>
                      <p className="text-sm text-slate-600 border border-slate-700 p-3 rounded-lg bg-slate-900/50 shadow-md">Les textes ont été entièrement revus pour garantir l'exhaustivité du programme de neuroanatomie.</p>
                    </div>
                  )}
                </div>
              </div>
            )}

      </div>
    </div>
  );
}

    // --- RENDER ---
    const root = ReactDOM.createRoot(document.getElementById('root'));
    root.render(<App />);
  </script>
</body>
</html>
